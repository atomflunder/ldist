name: Test Go Project
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Lint Go Code
        run: |
          go vet ./...

      - name: Test Go Project
        run: |
          go test -v ./...
